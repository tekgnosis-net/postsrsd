name: Build and publish

on:
  schedule:
    - cron: '0 6 * * *'
  push:
    branches: [main]
    paths:
      - Dockerfile
      - .github/workflows/build-and-publish.yml
  workflow_dispatch:
    inputs:
      version_override:
        description: 'Override the detected Alpine APK version (e.g. 2.0.11-r0)'
        required: false
        type: string

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: false

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/postsrsd
  ALPINE_BRANCH: v3.22

jobs:
  detect-version:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      apk_version: ${{ steps.detect.outputs.apk_version }}
      current_pin: ${{ steps.detect.outputs.current_pin }}
      bumped: ${{ steps.detect.outputs.bumped }}
      should_publish: ${{ steps.detect.outputs.should_publish }}
      dockerfile_changed: ${{ steps.detect.outputs.dockerfile_changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 2

      - name: Detect Alpine APK version, current pin, and publish need
        id: detect
        env:
          OVERRIDE: ${{ inputs.version_override }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          set -euo pipefail
          if [[ -n "$OVERRIDE" ]]; then
            APK_VERSION="$OVERRIDE"
            echo "Using override: $APK_VERSION"
          else
            APK_VERSION=$(curl -fsSL "https://dl-cdn.alpinelinux.org/alpine/${ALPINE_BRANCH}/community/x86_64/" \
              | grep -oE 'postsrsd-[0-9][^"]*\.apk' \
              | sort -V \
              | tail -1 \
              | sed 's/^postsrsd-//; s/\.apk$//')
          fi
          [[ "$APK_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+-r[0-9]+$ ]] \
            || { echo "ERROR: bad version '$APK_VERSION'" >&2; exit 1; }

          CURRENT_PIN=$(grep -oE 'POSTSRSD_PACKAGE_VERSION=[^[:space:]]+' Dockerfile | head -1 | cut -d= -f2)

          BUMPED=false
          [[ "$APK_VERSION" != "$CURRENT_PIN" ]] && BUMPED=true

          DOCKERFILE_CHANGED=false
          if git rev-parse HEAD~1 >/dev/null 2>&1; then
            if git diff --name-only HEAD~1 HEAD | grep -qE '^Dockerfile$'; then
              DOCKERFILE_CHANGED=true
            fi
          fi

          TAG_EXISTS=false
          if docker manifest inspect "${IMAGE}:${APK_VERSION}" >/dev/null 2>&1; then
            TAG_EXISTS=true
          fi

          SHOULD_PUBLISH=false
          case "$EVENT_NAME" in
            workflow_dispatch)
              SHOULD_PUBLISH=true
              ;;
            schedule)
              [[ "$TAG_EXISTS" == "false" ]] && SHOULD_PUBLISH=true
              ;;
            push)
              if [[ "$TAG_EXISTS" == "false" || "$DOCKERFILE_CHANGED" == "true" ]]; then
                SHOULD_PUBLISH=true
              fi
              ;;
          esac

          {
            echo "apk_version=$APK_VERSION"
            echo "current_pin=$CURRENT_PIN"
            echo "bumped=$BUMPED"
            echo "dockerfile_changed=$DOCKERFILE_CHANGED"
            echo "should_publish=$SHOULD_PUBLISH"
          } >> "$GITHUB_OUTPUT"
          echo "apk_version=$APK_VERSION"
          echo "current_pin=$CURRENT_PIN"
          echo "bumped=$BUMPED"
          echo "dockerfile_changed=$DOCKERFILE_CHANGED"
          echo "tag_exists=$TAG_EXISTS"
          echo "event_name=$EVENT_NAME"
          echo "should_publish=$SHOULD_PUBLISH"

  bump-dockerfile:
    needs: detect-version
    if: github.event_name == 'schedule' && needs.detect-version.outputs.bumped == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump POSTSRSD_PACKAGE_VERSION in Dockerfile
        env:
          NEW_VERSION: ${{ needs.detect-version.outputs.apk_version }}
        run: |
          set -euo pipefail
          sed -i "s/^ARG POSTSRSD_PACKAGE_VERSION=.*/ARG POSTSRSD_PACKAGE_VERSION=${NEW_VERSION}/" Dockerfile
          grep -E '^ARG POSTSRSD_PACKAGE_VERSION=' Dockerfile

      - name: Commit and push
        env:
          NEW_VERSION: ${{ needs.detect-version.outputs.apk_version }}
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add Dockerfile
          git commit -m "chore(deps): bump postsrsd to ${NEW_VERSION}"
          git push origin main

  build-and-push:
    needs: [detect-version, bump-dockerfile]
    if: |
      always() &&
      needs.detect-version.outputs.should_publish == 'true' &&
      (needs.bump-dockerfile.result == 'success' || needs.bump-dockerfile.result == 'skipped')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags and labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ needs.detect-version.outputs.apk_version }}
          labels: |
            org.opencontainers.image.title=postsrsd
            org.opencontainers.image.description=PostSRSd sidecar for mailcow (Alpine APK ${{ needs.detect-version.outputs.apk_version }})
            org.opencontainers.image.licenses=MIT
            org.opencontainers.image.version=${{ needs.detect-version.outputs.apk_version }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          build-args: |
            POSTSRSD_PACKAGE_VERSION=${{ needs.detect-version.outputs.apk_version }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: true
          sbom: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release-notes:
    needs: [detect-version, build-and-push]
    if: |
      always() &&
      needs.build-and-push.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Compute upstream version and image digest
        id: meta
        env:
          APK_VERSION: ${{ needs.detect-version.outputs.apk_version }}
        run: |
          set -euo pipefail
          UPSTREAM_VERSION="${APK_VERSION%-r*}"
          DIGEST=$(docker buildx imagetools inspect "${IMAGE}:${APK_VERSION}" --format '{{json .Manifest.Digest}}' | tr -d '"')
          echo "upstream_version=$UPSTREAM_VERSION" >> "$GITHUB_OUTPUT"
          echo "digest=$DIGEST" >> "$GITHUB_OUTPUT"

      - name: Fetch upstream postsrsd release notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          UPSTREAM_VERSION: ${{ steps.meta.outputs.upstream_version }}
        run: |
          set -euo pipefail
          NOTES=$(gh release view "$UPSTREAM_VERSION" \
            --repo roehling/postsrsd \
            --json body --jq .body 2>/dev/null || true)
          if [[ -n "$NOTES" ]]; then
            printf '%s\n' "$NOTES" > /tmp/upstream_notes.md
          else
            printf '%s\n' "(Upstream release notes not available for postsrsd ${UPSTREAM_VERSION}.)" \
              > /tmp/upstream_notes.md
          fi

      - name: Compute repo changes since previous release tag
        id: repo_changes
        env:
          APK_VERSION: ${{ needs.detect-version.outputs.apk_version }}
        run: |
          set -euo pipefail
          PREV_TAG=$(git tag --list '[0-9]*.[0-9]*.[0-9]*-r[0-9]*' --sort=-v:refname \
            | grep -vxF "$APK_VERSION" \
            | head -1 || true)
          if [[ -z "$PREV_TAG" ]]; then
            RANGE=""
            REL_PREV="(initial release)"
          else
            RANGE="${PREV_TAG}..HEAD"
            REL_PREV="$PREV_TAG"
          fi
          {
            for kind in feat fix docs chore ci refactor perf test; do
              if [[ -n "$RANGE" ]]; then
                MATCHES=$(git log "$RANGE" --pretty=format:'- %s' --grep="^$kind" || true)
              else
                MATCHES=$(git log --pretty=format:'- %s' --grep="^$kind" || true)
              fi
              if [[ -n "$MATCHES" ]]; then
                case $kind in
                  feat)     echo $'\n#### ✨ Features';;
                  fix)      echo $'\n#### 🐛 Fixes';;
                  docs)     echo $'\n#### 📚 Documentation';;
                  chore)    echo $'\n#### 🔧 Maintenance';;
                  ci)       echo $'\n#### 🤖 CI';;
                  refactor) echo $'\n#### ♻️ Refactoring';;
                  perf)     echo $'\n#### ⚡ Performance';;
                  test)     echo $'\n#### ✅ Tests';;
                esac
                echo "$MATCHES"
                echo
              fi
            done
          } > /tmp/repo_changes.md
          echo "prev_tag=$REL_PREV" >> "$GITHUB_OUTPUT"

      - name: Compose release body
        env:
          APK_VERSION: ${{ needs.detect-version.outputs.apk_version }}
          UPSTREAM_VERSION: ${{ steps.meta.outputs.upstream_version }}
          DIGEST: ${{ steps.meta.outputs.digest }}
          PREV_TAG: ${{ steps.repo_changes.outputs.prev_tag }}
        run: |
          set -euo pipefail
          {
            echo "## Image"
            echo
            echo '```'
            echo "docker pull ${IMAGE}:${APK_VERSION}"
            echo "docker pull ${IMAGE}:latest"
            echo '```'
            echo
            echo "| | |"
            echo "| :-- | :-- |"
            echo "| Alpine APK version | \`${APK_VERSION}\` |"
            echo "| Upstream postsrsd | [\`${UPSTREAM_VERSION}\`](https://github.com/roehling/postsrsd/releases/tag/${UPSTREAM_VERSION}) |"
            echo "| Manifest digest | \`${DIGEST}\` |"
            echo "| Architectures | \`linux/amd64\`, \`linux/arm64\` |"
            echo
            echo "## Upstream postsrsd ${UPSTREAM_VERSION}"
            echo
            cat /tmp/upstream_notes.md
            echo
            echo "## Repository changes"
            echo
            echo "Since previous release: ${PREV_TAG}"
            cat /tmp/repo_changes.md
          } > /tmp/release_notes.md
          echo "--- release notes preview ---"
          cat /tmp/release_notes.md

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APK_VERSION: ${{ needs.detect-version.outputs.apk_version }}
        run: |
          set -euo pipefail
          if gh release view "$APK_VERSION" >/dev/null 2>&1; then
            gh release edit "$APK_VERSION" --notes-file /tmp/release_notes.md
          else
            gh release create "$APK_VERSION" \
              --title "$APK_VERSION" \
              --notes-file /tmp/release_notes.md \
              --target main
          fi
