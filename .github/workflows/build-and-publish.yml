name: Build and publish

on:
  schedule:
    - cron: '0 6 * * *'
  push:
    branches: [main]
    paths:
      - Dockerfile
      - .github/workflows/build-and-publish.yml
  workflow_dispatch:
    inputs:
      version_override:
        description: 'Override the detected Alpine APK version (e.g. 2.0.11-r0)'
        required: false
        type: string

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: false

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/postsrsd
  ALPINE_BRANCH: v3.22

jobs:
  detect-version:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      apk_version: ${{ steps.detect.outputs.apk_version }}
      current_pin: ${{ steps.detect.outputs.current_pin }}
      bumped: ${{ steps.detect.outputs.bumped }}
      should_publish: ${{ steps.detect.outputs.should_publish }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Detect Alpine APK version, current pin, and publish need
        id: detect
        env:
          OVERRIDE: ${{ inputs.version_override }}
        run: |
          set -euo pipefail
          if [[ -n "$OVERRIDE" ]]; then
            APK_VERSION="$OVERRIDE"
            echo "Using override: $APK_VERSION"
          else
            APK_VERSION=$(curl -fsSL "https://dl-cdn.alpinelinux.org/alpine/${ALPINE_BRANCH}/community/x86_64/" \
              | grep -oE 'postsrsd-[0-9][^"]*\.apk' \
              | sort -V \
              | tail -1 \
              | sed 's/^postsrsd-//; s/\.apk$//')
          fi
          [[ "$APK_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+-r[0-9]+$ ]] \
            || { echo "ERROR: bad version '$APK_VERSION'" >&2; exit 1; }

          CURRENT_PIN=$(grep -oE 'POSTSRSD_PACKAGE_VERSION=[^[:space:]]+' Dockerfile | head -1 | cut -d= -f2)

          BUMPED=false
          [[ "$APK_VERSION" != "$CURRENT_PIN" ]] && BUMPED=true

          SHOULD_PUBLISH=true
          if docker manifest inspect "${IMAGE}:${APK_VERSION}" >/dev/null 2>&1; then
            SHOULD_PUBLISH=false
          fi

          {
            echo "apk_version=$APK_VERSION"
            echo "current_pin=$CURRENT_PIN"
            echo "bumped=$BUMPED"
            echo "should_publish=$SHOULD_PUBLISH"
          } >> "$GITHUB_OUTPUT"
          echo "apk_version=$APK_VERSION"
          echo "current_pin=$CURRENT_PIN"
          echo "bumped=$BUMPED"
          echo "should_publish=$SHOULD_PUBLISH"

  bump-dockerfile:
    needs: detect-version
    if: github.event_name == 'schedule' && needs.detect-version.outputs.bumped == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump POSTSRSD_PACKAGE_VERSION in Dockerfile
        env:
          NEW_VERSION: ${{ needs.detect-version.outputs.apk_version }}
        run: |
          set -euo pipefail
          sed -i "s/^ARG POSTSRSD_PACKAGE_VERSION=.*/ARG POSTSRSD_PACKAGE_VERSION=${NEW_VERSION}/" Dockerfile
          grep -E '^ARG POSTSRSD_PACKAGE_VERSION=' Dockerfile

      - name: Commit and push
        env:
          NEW_VERSION: ${{ needs.detect-version.outputs.apk_version }}
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add Dockerfile
          git commit -m "chore(deps): bump postsrsd to ${NEW_VERSION}"
          git push origin main

  build-and-push:
    needs: [detect-version, bump-dockerfile]
    if: |
      always() &&
      needs.detect-version.outputs.should_publish == 'true' &&
      (needs.bump-dockerfile.result == 'success' || needs.bump-dockerfile.result == 'skipped')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - run: echo "filled in by task 9"
