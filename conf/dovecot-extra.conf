# Required when using Dovecot Sieve "redirect" / SOGo "Vacation" / SOGo "Forward"
# alongside PostSRSd. Mailcow's shipped dovecot.conf sets
# sieve_redirect_envelope_from = recipient as a safer default for installations
# without SRS; with PostSRSd in place, "sender" is correct and lets the SRS
# forward rewrite fire on Sieve-redirected mail.
#
# Append to data/conf/dovecot/extra.conf in your mailcow stack, then:
#   docker compose restart dovecot-mailcow
plugin {
    sieve_redirect_envelope_from = sender
}
