# PostSRSd configuration for mailcow — reference sample.
# Bind-mounted by docker-compose.override.yml at /etc/postsrsd/postsrsd.conf.
# After editing, restart the sidecar:  docker compose restart postsrsd-mailcow

# === Required ===
# Your hosted mailcow domains. Mail FROM these is treated as local and not
# rewritten. See the README's "What goes in `domains`" subsection for guidance.
# Note: "invalid" is included to silence mailcow's watchdog SMTP-probe noise.
# RFC 6761 reserves this TLD; no legitimate public mail uses it.
domains = { "example.net", "example.com", "invalid", add-your-domains-here }

# Dedicated SRS rewrite domain (subdomain of one of your hosted domains).
# Must have MX, A/AAAA, SPF records and be added to mailcow as a domain
# with a catch-all alias. See README §6.3 and §6.4.
srs-domain = "srs.example.net"

# === Container plumbing — do not change ===
secrets-file = "/etc/postsrsd/secrets/list"
socketmap = inet:0.0.0.0:10003
unprivileged-user = ""
chroot-dir = ""

# === Optional knobs (defaults shown — uncomment to override) ===
# Socketmap connection keep-alive timeout (seconds).
#keep-alive = 30
# SRS tag separator. Valid: "=", "+", "-". Leave at default unless you have
# a specific gateway compatibility reason to change it.
#separator = "="
# Send log messages to syslog (mail facility) in addition to stderr.
#syslog = off
# Verbose logging for troubleshooting. Disable in production.
#debug = off
# Original-envelope handling. "embedded" is stateless and recommended.
# Switch to "database" only if you forward sender addresses longer than 51
# octets (rare). Requires WITH_SQLITE in the build (Alpine APK has it).
#original-envelope = embedded
#envelope-database = "sqlite:./senders.db"
# WARNING: changing the next two settings can turn your server into a spam
# relay. Do not touch unless you understand SRS hash rotation.
#hash-length = 4
#hash-minimum = 4
# For multi-tenant mailcow with many domains, use a domains file instead of
# the inline list above. One domain per line. See README §6.5.
#domains-file = "/etc/postsrsd/domains.list"
